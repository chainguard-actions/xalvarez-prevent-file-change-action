name: Test trusted authors input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          githubToken: ${{ github.token }}
          pattern: 'protected-file\.txt'
          trustedAuthors: 'user1, user2, user3'
        continue-on-error: true
      - name: Assert action ran with trustedAuthors
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          echo "PASS: action executed with trustedAuthors input"
